<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER ENGLISH DZ - Welcome</title>

    <!-- خطوط إسلامية واحترافية -->
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Cinzel:wght@600;800&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background: #020617;
            /* لون أزرق ليلي عميق ووقور */
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تأثيرات الإضاءة الهادئة */
        .bg-glow {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.08) 0%, rgba(2, 6, 23, 1) 80%);
            z-index: 0;
        }

        /* الحاوية الرئيسية */
        .intro-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        /* النصوص الإسلامية (مخفية في البداية) */
        .islamic-text {
            font-family: 'Amiri', serif;
            font-size: 4rem;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            position: absolute;
            opacity: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            text-align: center;
        }

        /* واجهة الأكاديمية (مخفية في البداية) */
        .academy-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
        }

        /* تنسيق الشعار */
        .logo-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 2rem;
        }

        .intro-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            position: relative;
            z-index: 2;
        }

        /* النصوص الإنجليزية */
        .intro-title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            color: #f8fafc;
            letter-spacing: 6px;
            margin-bottom: 0.5rem;
        }

        .intro-subtitle {
            font-size: 1.2rem;
            color: #d4af37;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 3rem;
            font-family: 'Amiri', serif;
        }

        /* الزر الوقور */
        .enter-btn {
            padding: 15px 50px;
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
            font-family: 'Amiri', serif;
            font-size: 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .enter-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
        }

        /* شاشة الانتقال السكينة */
        .transition-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 10vw;
            height: 10vw;
            background: radial-gradient(circle, #ffffff 0%, #fef08a 40%, transparent 100%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        @media (max-width: 768px) {
            .islamic-text {
                font-size: 2.5rem;
                padding: 0 20px;
            }

            .logo-wrapper {
                width: 140px;
                height: 140px;
            }

            .intro-title {
                font-size: 2rem;
                letter-spacing: 3px;
            }

            .intro-subtitle {
                font-size: 1rem;
            }

            .enter-btn {
                font-size: 1.2rem;
                padding: 12px 30px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-glow"></div>
    <div class="transition-overlay" id="overlay"></div>

    <div class="intro-container">
        <!-- 1. السلام عليكم أولاً -->
        <div class="islamic-text" id="salam">السَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللَّهِ وَبَرَكَاتُهُ</div>

        <!-- 2. ثم البسملة -->
        <div class="islamic-text" id="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>

        <!-- 3. محتوى الأكاديمية -->
        <div class="academy-content" id="academyContent">
            <div class="logo-wrapper">
                <div class="glow-ring-outer"></div>
                <img src="assent/Logo.png" alt="Master English Logo" class="intro-logo">
            </div>

            <h1 class="intro-title">MASTER ENGLISH DZ</h1>
            
            <!-- الفاصل الذهبي الأنيق -->
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:0.8rem;">
                <div style="height:1px; width:80px; background:linear-gradient(to right, transparent, #d4af37);"></div>
                <span style="color:#d4af37; font-size:1.3rem;">✦</span>
                <div style="height:1px; width:80px; background:linear-gradient(to left, transparent, #d4af37);"></div>
            </div>
            
            <p class="intro-subtitle">ابدأ التعلم ببركة الله</p>

            <button class="enter-btn" id="enterBtn" onclick="enterPortal()">دخول الأكاديمية ←</button>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const tl = gsap.timeline();

            // ═══════════════════════════════════════
            // الترتيب الصحيح: السلام عليكم أولاً ثم بسم الله
            // ═══════════════════════════════════════

            // 1. السلام عليكم أولاً — تحية المسلم
            tl.to("#salam", { opacity: 1, y: 0, duration: 2, ease: "power2.inOut" })
              .to("#salam", { opacity: 0, y: -15, duration: 1.5, ease: "power2.inOut", delay: 1.5 })

              // 2. ثم بسم الله الرحمن الرحيم — افتتاح التعلم
              .to("#bismillah", { opacity: 1, y: 0, duration: 2, ease: "power2.inOut" })
              .to("#bismillah", { opacity: 0, y: -15, duration: 1.5, ease: "power2.inOut", delay: 1.5 })

              // 3. ظهور الأكاديمية بسلاسة ونور
              .to("#academyContent", { opacity: 1, y: 0, duration: 2, ease: "power3.out" });
        });

        function enterPortal() {
            document.getElementById('enterBtn').style.pointerEvents = 'none';

            const tl = gsap.timeline();

            // انتقال هادئ ومنير يعبر عن نور العلم
            tl.to("#academyContent", { opacity: 0, y: -20, duration: 1, ease: "power2.inOut" })
                .to("#overlay", { scale: 30, opacity: 1, duration: 1.5, ease: "power2.inOut" }, "-=0.5")
                .call(() => {
                    window.location.href = 'lessons_hub.html';
                });
        }
    </script>
</body>

</html>
